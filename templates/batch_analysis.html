<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Stock Trend Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/batch_analysis.css') }}">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Batch Stock Trend Analysis</h1>
            <p>Analyze trends of multiple stocks to identify best buying and selling opportunities</p>
        </div>

        <!-- Back Button -->
        <div class="back-section">
            <a href="/" class="back-btn">← Back to Home</a>
        </div>

        <!-- Analysis Control Area -->
        <div class="control-section">
            <div class="control-container">
                <div class="stock-info" id="stockInfo">
                    <div class="info-card">
                        <div class="card-content">
                            <div class="card-title">Stock Count</div>
                            <div class="card-value" id="stockCount">Loading...</div>
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="card-content">
                            <div class="card-title">Stock List</div>
                            <div class="card-value" id="stockList">Loading...</div>
                        </div>
                    </div>
                </div>
                <button class="analyze-btn" id="analyzeBtn">Start Batch Analysis</button>
            </div>
        </div>

        <!-- Analysis Progress -->
        <div class="progress-section" id="progressSection" style="display: none;">
            <div class="progress-container">
                <h3>Analysis Progress</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p class="progress-text" id="progressText">Preparing...</p>
                <p class="current-stock" id="currentStock"></p>
            </div>
        </div>

        <!-- Error Message -->
        <div class="error" id="errorMessage" style="display: none;"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/modules/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/score_engine.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/score_details.js') }}"></script>
    <script src="{{ url_for('static', filename='js/batch_analysis.js') }}"></script>
</body>
</html>
