<div class="chart-container">
    <div class="chart-header">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span>Kline Chart</span>
            <div class="period-controls">
                <select id="periodSelect" class="period-select">
                    <option value="1y">1 Year</option>
                    <option value="3y">3 Years</option>
                    <option value="7y">7 Years</option>
                </select>
                <button id="periodBtn" class="period-btn" onclick="updatePeriodData()">Draw Chart</button>
            </div>
        </div>
    </div>
    <div class="chart-content" id="chartContent" style="display: none;">
        <div class="chart-placeholder">Please select period to view chart</div>
    </div>
</div>
